<style>
:root{--bg:#06111d;--bg2:#071a2a;--panel:#092238;--panel2:#0d3150;--panel3:#123b60;--line:#1b5f8e;--line2:#2d8fca;--text:#eef8ff;--soft:#a9d5ea;--muted:#6fa8c6;--blue:#1c9df2;--cyan:#16d4ff;--green:#28d88f;--amber:#ffd166;--red:#ff5d7e;--pink:#ec478e;--purple:#9b6cff;--wood:#7b4f2d;--floor:#c58a5a;--safe:env(safe-area-inset-bottom)}*{box-sizing:border-box}html,body{height:100%;margin:0}body{font-family:"Segoe UI",Tahoma,sans-serif;color:var(--text);background:radial-gradient(circle at 20% -10%,#0b466a 0,#06111d 42%,#04101b 100%);overflow:hidden;font-size:14px}button,input{font:inherit}.shell{height:100%;display:grid;grid-template-columns:166px minmax(0,1fr) 318px;grid-template-rows:48px minmax(0,1fr);gap:8px;padding:7px}.chrome,.side,.right,.main-card,.mini-card,.modal{background:linear-gradient(180deg,rgba(16,70,111,.92),rgba(5,24,42,.94));border:1px solid rgba(75,169,222,.42);box-shadow:0 0 0 1px rgba(0,0,0,.35) inset,0 16px 38px rgba(0,0,0,.36);border-radius:8px}.side{grid-row:1/3;padding:8px;display:flex;flex-direction:column;gap:8px}.brand{display:flex;gap:10px;align-items:center;padding:4px 4px 8px;border-bottom:1px solid rgba(97,184,232,.25)}.logo{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#f7c04a,#1fa7ff);display:grid;place-items:center;font-weight:900;border:2px solid rgba(255,255,255,.45);color:#07314d}.brand b{display:block;font-size:14px}.brand small{color:#b7ddef;font-size:11px}.nav{display:flex;flex-direction:column;gap:7px}.nav button,.top-btn,.btn{border:1px solid rgba(93,184,234,.42);background:linear-gradient(180deg,#145984,#0a2d4b);color:#d8f4ff;border-radius:6px;min-height:36px;display:flex;align-items:center;gap:9px;padding:0 10px;cursor:pointer;box-shadow:0 2px 0 rgba(255,255,255,.05) inset,0 7px 16px rgba(0,0,0,.18)}.nav button:hover,.nav button.active,.top-btn.active{background:linear-gradient(180deg,#2197d6,#0b5790);border-color:#59c8ff;color:white}.nav i{width:20px;text-align:center;font-style:normal}.workspace{margin-top:auto;background:linear-gradient(180deg,#12385b,#06233b);border:1px solid rgba(100,190,240,.38);border-radius:8px;padding:10px}.workspace b{display:block}.select-line{display:flex;justify-content:space-between;align-items:center;color:#cdeeff}.chrome{grid-column:2/4;display:flex;align-items:center;gap:7px;padding:6px}.top-btn{height:36px;min-width:124px;font-size:11px;justify-content:flex-start;white-space:nowrap}.top-btn strong{display:block;font-size:11px}.top-btn span{display:block;color:#9cd4ec;font-size:9px}.top-spacer{flex:1}.status-pill{height:34px;border-radius:6px;border:1px solid rgba(80,178,226,.45);background:#08243d;display:flex;align-items:center;gap:7px;padding:0 10px;font-size:12px}.logout{background:linear-gradient(180deg,#36a9e8,#1274b1);border-color:#6bd7ff;font-weight:700}.main{min-width:0;min-height:0;display:grid;grid-template-rows:auto minmax(0,1fr);gap:8px}.main-card{min-height:0;overflow:hidden;padding:10px}.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.title h1{font-size:24px;margin:0 0 5px;text-shadow:0 2px 0 #00131f}.title small{color:#b8dff1}.owner{border:1px solid rgba(38,216,143,.44);background:rgba(40,216,143,.13);border-radius:7px;padding:10px 13px;color:#d7ffe9;font-weight:700}.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:8px}.stat{background:linear-gradient(180deg,#14527a,#0b2b48);border:1px solid rgba(82,181,231,.4);border-radius:7px;min-height:54px;padding:9px;position:relative;overflow:hidden}.stat:before{content:"";position:absolute;inset:-20px auto auto -15px;width:54px;height:54px;border-radius:50%;background:var(--c);opacity:.24}.stat b{font-size:18px}.stat small{display:block;color:#a4d2e8;font-size:10px}.map-card{height:calc(100vh - 214px);min-height:496px;border:1px solid rgba(77,176,230,.46);border-radius:8px;background:#031323;padding:10px;display:grid;grid-template-rows:auto 1fr}.map-title{display:flex;align-items:center;justify-content:space-between;color:#e9f8ff;font-weight:700;font-size:12px;margin-bottom:8px}.icon-btn{width:28px;height:28px;border-radius:5px;border:1px solid rgba(98,194,244,.55);background:#103a5c;color:#dff7ff;cursor:pointer}.office{position:relative;overflow:hidden;border:1px solid rgba(78,168,219,.28);border-radius:7px;background:linear-gradient(180deg,#071424,#06111e);perspective:1000px}.building{position:absolute;left:50%;top:52%;width:min(96%,900px);height:86%;transform:translate(-50%,-50%);display:grid;grid-template-columns:1.05fr 1fr 1.08fr;grid-template-rows:1fr 1fr;gap:7px;padding:16px;background:linear-gradient(180deg,#c99564,#8c5c38);clip-path:polygon(6% 7%,94% 7%,99% 23%,97% 91%,61% 96%,58% 88%,42% 88%,39% 96%,3% 91%,1% 23%);box-shadow:0 30px 80px rgba(0,0,0,.55),0 0 0 6px #584031 inset}.room{position:relative;border:5px solid #554236;border-radius:3px;background:linear-gradient(135deg,#d8aa73,#9d6a3c);box-shadow:0 0 0 1px rgba(255,255,255,.16) inset;overflow:hidden}.room:nth-child(3),.room:nth-child(4){background:linear-gradient(135deg,#8b8a77,#5f6570)}.room:nth-child(5){background:linear-gradient(135deg,#b98b61,#745139)}.room:before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(90deg,rgba(255,255,255,.06) 0 12px,transparent 12px 24px);opacity:.55}.room-label{position:absolute;top:7px;left:50%;transform:translateX(-50%);background:#26201d;color:#f8ead7;border:1px solid #caa072;border-radius:3px;padding:3px 8px;font-weight:900;font-size:10px;letter-spacing:.04em;z-index:4}.desk{position:absolute;left:18%;bottom:18%;width:44%;height:22%;background:linear-gradient(180deg,#80502e,#402717);border:3px solid #2c1b10;border-radius:4px;box-shadow:0 7px 0 rgba(0,0,0,.28)}.shelf{position:absolute;right:7%;top:18%;width:18%;height:36%;background:#4a2d1a;border:3px solid #2d1a0e;border-radius:3px}.screen{position:absolute;right:12%;bottom:35%;width:18%;height:20%;background:linear-gradient(180deg,#1dbdff,#092b45);border:3px solid #1b2631;border-radius:3px;box-shadow:0 0 12px rgba(29,189,255,.45)}.plant{position:absolute;left:6%;bottom:12%;font-size:22px;z-index:4}.agent{position:absolute;z-index:8;text-align:center}.avatar{width:54px;height:62px;filter:drop-shadow(0 8px 6px rgba(0,0,0,.5))}.avatar .head{width:32px;height:32px;margin:0 auto -2px;border-radius:50%;background:#ffd2a5;border:3px solid #3a231a;position:relative}.avatar .head:before{content:"";position:absolute;inset:-4px -3px 17px;border-radius:50% 50% 35% 35%;background:var(--hair,#332019)}.avatar .body{width:38px;height:32px;margin:0 auto;border-radius:14px 14px 8px 8px;background:var(--shirt,#1689d5);border:3px solid #2b1b16}.avatar .eye{position:absolute;width:4px;height:4px;background:#111;border-radius:50%;top:16px}.avatar .eye.l{left:9px}.avatar .eye.r{right:9px}.tag{position:absolute;top:-24px;left:50%;transform:translateX(-50%);background:#181d24;border:1px solid #d8c39d;color:#fff;border-radius:3px;padding:3px 7px;font-size:10px;white-space:nowrap;box-shadow:0 4px 10px rgba(0,0,0,.35)}.bubble{position:absolute;z-index:10;background:linear-gradient(180deg,#103e62,#092a46);border:1px solid #70c9fa;color:#e7fbff;border-radius:5px;padding:5px 7px;font-size:10px;white-space:nowrap;box-shadow:0 8px 16px rgba(0,0,0,.35)}.a-owner{left:20%;top:25%;--hair:#171819;--shirt:#222}.a-mina{left:50%;top:31%;--hair:#e46b23;--shirt:#22b6a9}.a-leo{left:73%;top:27%;--hair:#12151b;--shirt:#a92765}.a-sam{left:14%;top:66%;--hair:#1a1b1d;--shirt:#2188c8}.a-ava{left:55%;top:68%;--hair:#9b603b;--shirt:#f1d4c8}.a-upload{left:80%;top:69%;--hair:#f5c143;--shirt:#2f99d1}.door{position:absolute;left:42%;bottom:0;width:16%;height:17%;background:linear-gradient(180deg,#244b62,#0d2536);border:4px solid #2c2119;border-bottom:0;z-index:7}.sign{position:absolute;left:61%;bottom:4%;background:#2e241d;color:#f8d99b;border:2px solid #c5955d;padding:6px 14px;font-weight:900;z-index:9;box-shadow:0 8px 16px rgba(0,0,0,.3)}.tree{position:absolute;right:3%;bottom:7%;font-size:72px;z-index:7}.right{grid-row:2;grid-column:3;padding:10px;display:flex;flex-direction:column;min-height:0}.team-head{display:flex;justify-content:space-between;border-bottom:1px solid rgba(91,180,230,.28);padding-bottom:8px}.team-head h3{margin:0;font-size:15px}.agent-card{background:linear-gradient(180deg,#113a5d,#09273f);border:1px solid rgba(86,181,230,.36);border-radius:7px;padding:10px;margin-top:9px}.agent-line{display:flex;gap:8px}.face{width:38px;height:38px;border-radius:50%;background:#d97338;border:2px solid #ffd0a6;display:grid;place-items:center}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:8px}.metrics div{border:1px solid rgba(94,185,233,.25);border-radius:5px;padding:6px;background:#082139}.metrics b{font-size:11px}.metrics small{display:block;color:#8ec5dc;font-size:9px}.chat{flex:1;overflow:auto;margin-top:10px;display:flex;flex-direction:column;gap:8px;padding-right:2px}.msg{display:flex;gap:7px;align-items:flex-start}.msg .mini-face{width:24px;height:24px;border-radius:50%;background:#d87932;flex:0 0 24px;display:grid;place-items:center;font-size:12px;border:1px solid #f7b06b}.bubble-msg{background:linear-gradient(180deg,#0f74bd,#0d4b7f);border:1px solid #4fc2ff;border-radius:6px;padding:8px;color:#e9fbff;font-size:12px;line-height:1.35}.msg.bot .bubble-msg{background:linear-gradient(180deg,#0c756e,#07433f);border-color:#52d7c8}.msg.warn .bubble-msg{background:linear-gradient(180deg,#8b6b19,#473812);border-color:#f7cf61}.role{display:inline-block;margin-bottom:4px;font-weight:800;font-size:10px;color:#fff}.composer{display:grid;grid-template-columns:32px 1fr 32px;gap:6px;padding-top:8px}.composer input{background:#082139;color:#dff8ff;border:1px solid rgba(77,178,232,.5);border-radius:5px;padding:0 10px;min-width:0}.small-actions{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}.small-actions button{font-size:10px;min-height:28px;flex:1}.bottom-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:9px}.page{display:none;height:100%;min-height:0}.page.active{display:block}.panel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.window{background:linear-gradient(180deg,#103b5f,#06243c);border:1px solid rgba(82,180,231,.42);border-radius:8px;padding:12px;min-height:130px}.window h3{margin:0 0 8px}.table{width:100%;border-collapse:collapse}.table td,.table th{padding:9px;border-bottom:1px solid rgba(120,200,240,.16);font-size:12px;text-align:left}.progress{height:8px;background:#082139;border:1px solid rgba(88,180,230,.3);border-radius:10px;overflow:hidden}.progress i{display:block;height:100%;background:linear-gradient(90deg,#1aa7ff,#32e7c5)}.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.task{background:#092940;border:1px solid rgba(80,174,225,.32);border-radius:7px;padding:9px;margin-top:8px}.toast{position:fixed;left:50%;bottom:20px;transform:translate(-50%,80px);opacity:0;transition:.22s;background:#092940;border:1px solid #5cc8ff;border-radius:8px;padding:10px 14px;z-index:100;color:#eafaff}.toast.show{opacity:1;transform:translate(-50%,0)}.mobile-tabs{display:none}.hidden-desktop{display:none}@media(max-width:1180px){.shell{grid-template-columns:146px minmax(0,1fr);grid-template-rows:48px minmax(0,1fr)}.right{display:none}.chrome{grid-column:2}.stats{grid-template-columns:repeat(3,1fr)}.building{width:100%}}@media(max-width:760px){body{overflow:auto}.shell{height:auto;min-height:100%;display:block;padding:7px 7px calc(74px + var(--safe))}.side{display:none}.chrome{position:sticky;top:0;z-index:30;overflow:auto;margin-bottom:8px}.top-btn{min-width:112px}.main-card{height:auto}.head{display:block}.owner{display:inline-block;margin-top:8px}.stats{grid-template-columns:repeat(2,1fr)}.map-card{height:auto;min-height:660px}.office{height:590px}.building{height:95%;grid-template-columns:1fr;grid-template-rows:repeat(6,1fr);clip-path:none;padding:8px}.room{min-height:82px}.room-label{left:8px;transform:none}.tree,.sign,.door{display:none}.agent{transform:scale(.82)}.a-owner{left:36%;top:8%}.a-mina{left:42%;top:23%}.a-leo{left:45%;top:38%}.a-sam{left:36%;top:54%}.a-ava{left:42%;top:68%}.a-upload{left:44%;top:83%}.panel-grid,.kanban{grid-template-columns:1fr}.mobile-tabs{display:grid;position:fixed;left:7px;right:7px;bottom:calc(7px + var(--safe));grid-template-columns:repeat(5,1fr);gap:5px;background:rgba(5,21,36,.92);border:1px solid rgba(93,184,234,.42);border-radius:10px;padding:6px;z-index:60}.mobile-tabs button{height:44px;border:0;border-radius:7px;background:transparent;color:#bde5f3}.mobile-tabs button.active{background:#137ec0;color:white}.hidden-desktop{display:block}}

</head><body>
<div class="shell">
  <aside class="side"><div class="brand"><div class="logo">B</div><div><b>Benz</b><small>Virtual Office</small></div></div><nav class="nav" id="sideNav"></nav><div class="workspace"><div class="select-line"><span>Workspace</span><span>⌄</span></div><b>Benz Main Office</b></div></aside>
  <header class="chrome" id="topBar"></header>
  <main class="main"><section class="main-card" id="mainCard"></section></main>
  <aside class="right"><div class="team-head"><div><h3>Team Chat</h3><small>#int-general</small></div><div>👩‍💼 🧑‍💻 👨‍🔬 👩‍🎨</div></div><div class="agent-card"><div class="agent-line"><div class="face">👩🏻</div><div><b>Selected Agent</b><br><strong>Mina · AI Secretary</strong><br><small>@Memory, Notion, Google Workspace และงานประจำวัน</small></div></div><div class="metrics"><div><b>Online</b><small>Status</small></div><div><b>12 tasks</b><small>Queue</small></div><div><b>Low risk</b><small>Risk</small></div></div><div class="small-actions"><button class="btn">Notion</button><button class="btn">Gmail</button><button class="btn">Drive</button></div></div><div class="chat" id="chat"></div><div class="composer"><button class="btn">📎</button><input id="chatInput" placeholder="พิมพ์คำสั่งที่นี่..." onkeydown="if(event.key==='Enter')sendChat()"><button class="btn" onclick="sendChat()">➤</button></div><div class="small-actions"><button class="btn" onclick="quick('Ask Mina')">Ask Mina</button><button class="btn" onclick="quick('Ask Leo')">Ask Leo</button><button class="btn" onclick="quick('Ask Sam')">Ask Sam</button><button class="btn" onclick="quick('Ask Ava')">Ask Ava</button></div><div class="bottom-actions"><button class="btn" onclick="toast('Saved to Notion')">💾 Save to Notion</button><button class="btn" onclick="toast('Sent to Next')">▶ Send to Next</button></div></aside>
</div><nav class="mobile-tabs" id="mobileTabs"></nav><div class="toast" id="toast"></div>
<script>const tg=window.Telegram&&window.Telegram.WebApp;if(tg){tg.ready();tg.expand();if(!tg.isVersionAtLeast||tg.isVersionAtLeast('6.1')){tg.setHeaderColor('#071725');tg.setBackgroundColor('#071725')}}
const menus=[['overview','⌂','Office Overview'],['chat','□','Chat Center'],['characters','♙','Characters'],['workflow','▣','Approval Board'],['skills','▤','Journal / SOP'],['reports','▥','Daily Brief'],['settings','⚙','Settings']];
const defaultTops=[['backend','💼','FastAPI Backend','loading'],['mt5','▣','MetaTrader 5','loading'],['bridge','🔁','MT5 Bridge','loading'],['signal','📈','Signal File','loading'],['ea','🛡','EA Runtime','loading'],['notion','▤','Notion','loading'],['google','📁','Google Workspace','loading']];
const API_CANDIDATES=[location.origin,'http://127.0.0.1:8000'];
const state={page:localStorage.benzPage||'overview',apiBase:localStorage.officeApiBase||'',live:null,lastError:null,msgs:[['You (Benz)','เปิดระบบ Atsawin Office แบบ live: journal, approval, daily brief','me'],['Mina','พร้อมค่ะ กำลัง sync MT5/EA → local journal → brief/approval board','bot']]};
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function statusLabel(s){return ({online:'Online',configured:'Connected',setup_needed:'Setup Needed',offline:'Offline',unknown:'Unknown',loading:'Loading',waiting_owner_approval:'Waiting Approval',approved:'Approved',rejected:'Rejected',logged:'Logged'})[s]||s}
function statusColor(s){return s==='online'||s==='configured'||s==='approved'||s==='logged'?'#28d88f':s==='setup_needed'||s==='waiting_owner_approval'?'#ffd166':s==='loading'?'#16d4ff':'#ff5d7e'}
async function apiFetch(path,opts={}){const bases=state.apiBase?[state.apiBase,...API_CANDIDATES.filter(x=>x!==state.apiBase)]:API_CANDIDATES;let last;for(const base of bases){try{const r=await fetch(base+path,{...opts,headers:{'Content-Type':'application/json',...(opts.headers||{})}});if(!r.ok)throw new Error(`${r.status} ${r.statusText}`);state.apiBase=base;localStorage.officeApiBase=base;return await r.json()}catch(e){last=e}}throw last}
async function refreshLive(){try{const data=await apiFetch('/api/office/status');state.live=data;state.lastError=null;syncLiveMessages(data);render()}catch(e){state.lastError=e.message;renderTop();if(!state.msgs.some(m=>String(m[1]).includes('เชื่อม backend ไม่ได้')))state.msgs.push(['Mina','เชื่อม backend ไม่ได้: '+e.message+' — เปิด FastAPI ที่ port 8000 ก่อนค่ะ','warn']);renderChat()}}
function syncLiveMessages(data){const runtime=data.trading?.ea_runtime_status;const sig=data.trading?.latest_signal;if(sig&&!state.msgs.some(m=>String(m[1]).includes('Live signal'))){state.msgs.push(['MT5',`Live signal: ${String(sig.signal).toUpperCase()} ${sig.mt5_symbol||sig.symbol||''} ${sig.timeframe||''} conf=${sig.confidence}`,'bot'])}if(runtime&&!state.msgs.some(m=>String(m[1]).includes('EA decision'))){state.msgs.push(['EA',`EA decision: ${runtime.decision||'UNKNOWN'} / ${runtime.reason||'no reason'}`,(runtime.decision==='SKIP'?'warn':'bot')])}}
function renderNav(){sideNav.innerHTML=menus.map(m=>`<button class="${state.page===m[0]?'active':''}" onclick="go('${m[0]}')"><i>${m[1]}</i><span>${m[2]}</span></button>`).join('');mobileTabs.innerHTML=menus.slice(0,5).map(m=>`<button class="${state.page===m[0]?'active':''}" onclick="go('${m[0]}')">${m[1]}<br><small>${m[2].split(' ')[0]}</small></button>`).join('')}
function renderTop(){const rows=state.live?.integrations||defaultTops.map(t=>({id:t[0],name:t[2],status:t[3],detail:''}));const icons={backend:'💼',mt5:'▣',bridge:'🔁',signal:'📈',ea:'🛡',notion:'▤',google:'📁'};topBar.innerHTML=rows.map(t=>`<button class="top-btn ${t.status==='online'||t.status==='configured'?'active':''}" onclick="toast('${esc(t.name)}: ${esc(statusLabel(t.status))} ${esc(t.detail||'')}')"><span style="color:${statusColor(t.status)}">${icons[t.id]||'●'}</span><div><strong>${esc(t.name)}</strong><span style="color:${statusColor(t.status)}">● ${esc(statusLabel(t.status))}</span></div></button>`).join('')+`<div class="top-spacer"></div><div class="status-pill">${state.lastError?'⚠':'🔔'}</div><div class="status-pill">🛡 ${state.live?'Local OS':'Loading'}</div><button class="top-btn logout" onclick="refreshLive()">Refresh</button>`}
function stat(n,l,c){return `<div class="stat" style="--c:${c}"><b>${esc(n)}</b><small>${esc(l)}</small></div>`}
function kpi(name,fallback){return state.live?.kpis?.[name]??fallback}
function briefCard(){const b=state.live?.daily_brief||{};return `<div class="window" style="margin-top:10px"><h3>Daily Brief Agent</h3><p><b>${esc(b.headline||'รอข้อมูล journal')}</b></p><p>${esc(b.trading_summary||'')}</p><p><small>${esc(b.risk_notes||'')}</small></p><button class="btn" onclick="go('reports')">Open full brief</button></div>`}
function approvalMini(){const approvals=state.live?.approvals||[];return `<div class="window" style="margin-top:10px"><h3>Approval Queue</h3>${approvals.slice(0,3).map(a=>`<div class="task"><b>${esc(a.title)}</b><br><small>${esc(a.detail)}</small><div class="small-actions"><button class="btn" onclick="decide('${a.id}','approve')">Approve</button><button class="btn" onclick="decide('${a.id}','reject')">Reject</button></div></div>`).join('')||'<small>No waiting approvals</small>'}</div>`}
function overview(){const sys=state.live?.system||{};const sig=state.live?.trading?.latest_signal||{};const rt=state.live?.trading?.ea_runtime_status||{};const j=state.live?.journal||{};return `<div class="page active"><div class="head"><div class="title"><small>OFFICE OVERVIEW · ${state.live?'LIVE OS':'OFFLINE'}</small><h1>Atsawin Command Center</h1><small>${state.live?`API: ${esc(state.apiBase)} · CPU ${sys.cpu_percent}% · RAM ${sys.memory_percent}% · Disk ${sys.disk_percent}%`:'กำลังรอ backend /api/office/status'}</small></div><div class="owner">▣ Owner verified</div></div><div class="stats">${stat(kpi('waiting_approval',0),'Waiting Approval','#ffd166')}${stat(kpi('need_attention',0),'Need Attention','#ff4a8a')}${stat(j.signals_count||0,'Signal Journal','#16d4ff')}${stat(j.runtime_count||0,'EA Decisions','#4db8ff')}${stat(kpi('secrets_exposed',0),'Secrets Exposed','#28d88f')}${stat(kpi('production_release','Locked'),'Production Release','#9b6cff')}</div>${briefCard()}${approvalMini()}<div class="map-card"><div class="map-title"><span>Agent Live Map · Signal ${esc(sig.signal||'none')} · EA ${esc(rt.decision||'none')}</span><button class="icon-btn" onclick="refreshLive()">↻</button></div><div class="office"><div class="building">${['1. BENZ','2. MINA OPS','3. JOURNAL DB','4. DAILY BRIEF','5. APPROVAL','6. MT5'].map(r=>`<div class="room"><div class="room-label">${r}</div><div class="shelf"></div><div class="screen"></div><div class="desk"></div><div class="plant">🌿</div></div>`).join('')}<div class="door"></div><div class="sign">ATSAWIN<br>OFFICE</div><div class="tree">🌳</div></div>${agent('a-owner','Benz','Owner gate','owner')}${agent('a-mina','Mina','Daily brief','mina')}${agent('a-leo','Journal','DB sync','leo')}${agent('a-sam','Risk','Approval','sam')}${agent('a-ava','Ava',statusLabel((state.live?.integrations||[]).find(x=>x.id==='notion')?.status),'ava')}${agent('a-upload','MT5',`${sig.signal||'no signal'} / ${rt.decision||'no EA'}`,'upload')}</div></div></div>`}
function agent(cls,name,bub,type){const shirts={owner:'#222',mina:'#1aa99a',leo:'#b52a72',sam:'#197fba',ava:'#f5d0bf',upload:'#2596d4'};return `<div class="agent ${cls}"><div class="tag">${esc(name)}</div><div class="avatar" style="--shirt:${shirts[type]}"><div class="head"><span class="eye l"></span><span class="eye r"></span></div><div class="body"></div></div><div class="bubble">${esc(bub)}</div></div>`}
function chatPage(){return `<div class="page active"><div class="head"><div class="title"><small>CHAT CENTER</small><h1>Command Room</h1><small>คำสั่งถูกบันทึกใน SQLite journal + JSONL compatibility log; risk action เข้า approval gate</small></div></div><div class="panel-grid"><div class="window"><h3>Quick Commands</h3><button class="btn" onclick="quick('สรุปสถานะ MT5 และ EA ตอนนี้')">MT5 status</button><button class="btn" onclick="quick('งานไหนต้อง approve')">Approval list</button><button class="btn" onclick="quick('สร้าง daily brief วันนี้')">Daily brief</button></div><div class="window"><h3>Live Command Log</h3>${(state.live?.commands||[]).slice(-5).map(c=>`<p><b style="color:${statusColor(c.status)}">${esc(statusLabel(c.status))}</b><br><small>${esc(c.text||'')}</small></p>`).join('')||'<p><small>No command log yet</small></p>'}</div><div class="window"><h3>Safety</h3><p>buy/sell/trade/publish/delete/send email จะถูกพักเป็น waiting_owner_approval อัตโนมัติ</p><button class="btn" onclick="go('workflow')">Open Approval Board</button></div></div></div>`}
function characters(){const list=state.live?.agents||[];return `<div class="page active"><div class="head"><div class="title"><small>CHARACTERS</small><h1>AI Agent Team</h1><small>เพิ่ม Journal DB, Daily Brief และ Approval Gate เป็น agent role จริง</small></div></div><div class="panel-grid">${list.map(a=>`<div class="window"><h3>${esc(a.name)} <small style="color:${statusColor(a.status)}">● ${esc(statusLabel(a.status))}</small></h3><p>${esc(a.role)}<br><small>${esc(a.detail)}</small></p><div class="metrics"><div><b>${esc(a.queue)}</b><small>Queue</small></div><div><b>${esc(a.risk)}</b><small>Risk</small></div><div><b>RO</b><small>Mode</small></div></div><button class="btn" onclick="quick('ขอสถานะ ${esc(a.name)}')">Command</button></div>`).join('')||'<div class="window"><h3>Loading agents...</h3></div>'}</div></div>`}
function workflow(){const rows=state.live?.workflow||[];const approvals=state.live?.approvals||[];const lanes=['Waiting Approval','In Progress','Backlog','Done / Audit'];return `<div class="page active"><div class="head"><div class="title"><small>WORKFLOW</small><h1>Approval Board</h1><small>Approve/Reject ทำงานผ่าน backend จริง แต่ยังไม่ execute trade/publish เอง</small></div></div><div class="kanban">${lanes.map(l=>`<div class="window"><h3>${l}</h3>${rows.filter(x=>x.lane===l).map(t=>`<div class="task"><b>${esc(t.title)}</b><br><small>${esc(t.detail)} · risk ${esc(t.risk)}</small>${t.approval_id?`<div class="small-actions"><button class="btn" onclick="decide('${t.approval_id}','approve')">Approve</button><button class="btn" onclick="decide('${t.approval_id}','reject')">Reject</button></div>`:`<button class="btn" onclick="quick('เปิดงาน ${esc(t.title)}')">Open</button>`}</div>`).join('')||'<small>No items</small>'}</div>`).join('')}</div><div class="window" style="margin-top:10px"><h3>Approval Table</h3><table class="table"><tr><th>Title</th><th>Status</th><th>Action</th></tr>${approvals.map(a=>`<tr><td>${esc(a.title)}</td><td>${esc(statusLabel(a.status))}</td><td><button class="btn" onclick="decide('${a.id}','approve')">✓</button><button class="btn" onclick="decide('${a.id}','reject')">×</button></td></tr>`).join('')||'<tr><td>No approvals</td><td>OK</td><td>-</td></tr>'}</table></div></div>`}
function skills(){const j=state.live?.journal||{};const rows=['Trading journal SOP','Daily brief SOP','Approval gate SOP','Meta Ads read-only check','Google tracking audit','Telegram Mini App UI'];return `<div class="page active"><div class="head"><div class="title"><small>JOURNAL / SOP</small><h1>Local Memory Core</h1><small>SQLite journal เริ่มเก็บ signal/runtime/commands/approvals แล้ว</small></div></div><div class="stats">${stat(j.signals_count||0,'Signals','#16d4ff')}${stat(j.runtime_count||0,'EA Runtime','#4db8ff')}${stat(j.commands_count||0,'Commands','#ffd166')}${stat(j.waiting_approval||0,'Approvals','#ff5d7e')}</div><div class="window"><table class="table"><tr><th>SOP</th><th>Mode</th><th>Action</th></tr>${rows.map(r=>`<tr><td>${r}</td><td>Safe / Approval</td><td><button class="btn" onclick="quick('เปิด SOP ${r}')">Open</button></td></tr>`).join('')}</table></div></div>`}
function reports(){const b=state.live?.daily_brief||{};const j=state.live?.journal||{};return `<div class="page active"><div class="head"><div class="title"><small>DAILY BRIEF</small><h1>Trading Coach Report</h1><small>สรุปจาก journal + EA runtime + approval queue</small></div></div><div class="panel-grid">${stat(j.signals_count||0,'Signals Logged','#28d88f')}${stat(j.runtime_count||0,'EA Decisions','#16d4ff')}${stat(b.waiting_approval||0,'Waiting Approval','#ffd166')}</div><div class="window" style="margin-top:10px"><h3>${esc(b.headline||'No brief yet')}</h3><p>${esc(b.trading_summary||'')}</p><p><b>Risk:</b> ${esc(b.risk_notes||'')}</p><p><b>Recommendation:</b> ${esc(b.recommendation||'')}</p><h3>Skip Reasons</h3><table class="table"><tr><th>Reason</th><th>Count</th></tr>${(b.skip_reasons||[]).map(r=>`<tr><td>${esc(r.reason)}</td><td>${esc(r.count)}</td></tr>`).join('')||'<tr><td>No skips</td><td>0</td></tr>'}</table><button class="btn" onclick="refreshLive()">Regenerate from journal</button></div></div>`}
function settings(){const paths=state.live?.paths||{};return `<div class="page active"><div class="head"><div class="title"><small>SETTINGS</small><h1>Control Settings</h1><small>API base: ${esc(state.apiBase||'auto detect')}</small></div></div><div class="panel-grid"><div class="window"><h3>Backend API</h3><p>${esc(state.apiBase||'not connected')}</p><button class="btn" onclick="refreshLive()">Reconnect</button></div><div class="window"><h3>Signal file</h3><p><small>${esc(paths.signal_file||'unknown')}</small></p></div><div class="window"><h3>EA runtime</h3><p><small>${esc(paths.ea_runtime_file||'unknown')}</small></p></div><div class="window"><h3>Command log</h3><p><small>${esc(paths.command_log||'unknown')}</small></p></div></div></div>`}
function render(){renderNav();renderTop();const map={overview,chat:chatPage,characters,workflow,skills,reports,settings};mainCard.innerHTML=map[state.page]();renderChat();localStorage.benzPage=state.page}
function go(p){state.page=p;render()}
function renderChat(){chat.innerHTML=state.msgs.map(m=>`<div class="msg ${m[2]||''}"><div class="mini-face">${m[2]==='me'?'🧑':'🤖'}</div><div class="bubble-msg"><span class="role">${esc(m[0])}</span><br>${esc(m[1])}</div></div>`).join('');chat.scrollTop=chat.scrollHeight}
async function sendChat(){const el=document.getElementById('chatInput');if(!el.value.trim())return;const text=el.value.trim();state.msgs.push(['You (Benz)',text,'me']);el.value='';renderChat();try{const res=await apiFetch('/api/office/command',{method:'POST',body:JSON.stringify({text,source:'virtual-office',target:'mina'})});state.msgs.push(['Mina',res.command.reply,res.command.risk==='approval_required'?'warn':'bot']);await refreshLive()}catch(e){state.msgs.push(['Mina','ส่ง command เข้า backend ไม่สำเร็จ: '+e.message,'warn']);renderChat()}}
async function quick(t){state.msgs.push(['You (Benz)',t,'me']);renderChat();try{const res=await apiFetch('/api/office/command',{method:'POST',body:JSON.stringify({text:t,source:'quick-command',target:'mina'})});state.msgs.push(['Mina',res.command.reply,res.command.risk==='approval_required'?'warn':'bot']);await refreshLive()}catch(e){state.msgs.push(['Mina','ส่ง quick command ไม่สำเร็จ: '+e.message,'warn']);renderChat()}toast(t)}
async function decide(id,action){try{const res=await apiFetch(`/api/office/approvals/${id}/${action}`,{method:'POST',body:JSON.stringify({note:`${action} from Virtual Office UI`})});state.msgs.push(['Mina',`Approval ${statusLabel(res.approval.status)}: ${res.approval.title}`,'bot']);await refreshLive();toast(`${action} ${id}`)}catch(e){state.msgs.push(['Mina','ตัดสินใจ approval ไม่สำเร็จ: '+e.message,'warn']);renderChat()}}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800)}
render();refreshLive();setInterval(refreshLive,10000);</script>
</body></html>
